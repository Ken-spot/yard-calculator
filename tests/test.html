<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yard Tools — Engine Tests</title>
  <style>
    body { font-family: ui-monospace, Consolas, monospace; margin: 1rem; background: #111; color: #ddd; }
    h1 { font-size: 1.1rem; }
    .pass { color: #6c6; }
    .fail { color: #f66; font-weight: bold; }
    #summary { font-size: 1.2rem; margin: .8rem 0; }
    li { margin: .15rem 0; }
  </style>
</head>
<body>
  <h1>Yard Tools — engine tests</h1>
  <div id="summary">Running…</div>
  <ul id="list"></ul>
  <script type="module">
    import { runTests } from './engine.test.js';
    const results = runTests();
    const list = document.getElementById('list');
    let failed = 0;
    for (const r of results) {
      const li = document.createElement('li');
      li.className = r.pass ? 'pass' : 'fail';
      li.textContent = r.pass
        ? `ok    ${r.name}`
        : `FAIL  ${r.name} — expected ${r.expected}, got ${r.actual}`;
      if (!r.pass) failed++;
      list.appendChild(li);
    }
    const summary = document.getElementById('summary');
    summary.textContent = `${results.length - failed}/${results.length} passed`;
    summary.className = failed ? 'fail' : 'pass';
    // Machine-readable hook for automated verification
    window.__TEST_RESULTS__ = { total: results.length, failed };
  </script>
</body>
</html>
